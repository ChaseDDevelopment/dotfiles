# =============================================================================
# Tmux Configuration
# =============================================================================

# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Terminal capabilities (true color + undercurl support)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB,xterm-256color:RGB"

# Enable mouse support
set -g mouse on

# Allow passthrough for image previews (yazi, kitty graphics protocol)
set -g allow-passthrough on

# Use OSC 52 escape sequences for clipboard (works over SSH, no xclip/pbcopy needed)
set -s set-clipboard on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Change prefix from C-b to C-Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Window navigation with Alt+H and Alt+L
bind -n M-H previous-window
bind -n M-L next-window

# Enable vi mode for copy mode
set-window-option -g mode-keys vi

# Vi-style copy mode key bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Drop the default `"` and `%` split bindings. The `|` + `-` bindings
# are set AFTER `run ~/.tmux/plugins/tpm/tpm` below so plugins that
# bind `|` on load (e.g. tmux-menus) don't clobber ours.
unbind '"'
unbind %

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vim-tmux-navigator configuration
# Smart pane switching with awareness of Vim splits
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# Increase scrollback buffer size
set -g history-limit 50000

# Reduce escape time for faster command sequences
set -sg escape-time 10

# Enable focus events for vim
set -g focus-events on

# Aggressive resize for better multi-monitor support
setw -g aggressive-resize on

# Auto-cleanup: server exits when no sessions remain
set -g exit-empty on

# Programs can't hijack the window name via escape sequences.
# Our automatic-rename-format below picks a semantic label based on
# the foreground process / cwd.
set-option -g allow-rename off
set -g automatic-rename on

# Informative window names:
# - Dotted-version gibberish (e.g. Claude Code sets argv[0] to its
#   version "2.1.114") -> "claude"
# - Interactive shell (zsh/bash) -> basename of cwd (so you can see
#   which repo / directory the window is in)
# - Anything else -> the actual command name
set -g automatic-rename-format "#{?#{m:*.*.*,#{pane_current_command}},claude,#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{?#{==:#{pane_current_command},bash},#{b:pane_current_path},#{pane_current_command}}}}"

set -g window-status-format         ' #I:#W '
set -g window-status-current-format ' #I:#W '

# =============================================================================
# Plugins
# =============================================================================

# Set plugin manager path (required for TPM install scripts to work outside tmux)
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Status bar framework — tmux-powerkit supplies battery/cpu/memory/git/
# hostname/ssh/datetime modules internally, so the standalone
# tmux-battery and tmux-cpu plugins are intentionally absent here.
set -g @plugin 'fabioluciano/tmux-powerkit'

# --- Copy/paste ---
set -g @plugin 'tmux-plugins/tmux-yank'

# --- Text extraction ---
set -g @plugin 'laktak/extrakto'

# --- Floating pane ---
set -g @plugin 'omerxx/tmux-floax'

# =============================================================================
# Plugin Configuration
# =============================================================================

# Powerkit (TokyoNight Night). Minimal module set — hostname/ssh are
# redundant with the shell prompt's OS + SSH segments, git is already
# in the shell prompt, and the clock is noise. Battery auto-hides on
# desktops with no battery detected.
set -g @powerkit_theme 'tokyo-night'
set -g @powerkit_theme_variant 'night'
set -g @powerkit_plugins 'cpu,memory,battery'

# Powerkit overrides tmux-native status-position at load, so pinning
# the bar to the bottom must go through its own option.
set -g @powerkit_status_position 'bottom'

set -g @powerkit_bar_layout 'single'
set -g @powerkit_separator_style 'rounded'
set -g @powerkit_edge_separator_style 'rounded'
set -g @powerkit_status_interval 5
set -g @powerkit_lazy_loading 'true'

# Powerkit's default keybindings-list binding (C-y) collides with
# tmux-yank's @yank_line default. Move it to C-? so both coexist.
set -g @powerkit_keybindings_key 'C-?'

# tmux-yank
set -g @yank_selection_mouse 'clipboard'
set -g @yank_action 'copy-pipe-no-clear'
set -g @yank_line 'M-y'

# Extrakto
set -g @extrakto_key 'tab'
set -g @extrakto_split_direction 'p'
set -g @extrakto_popup_size '60%'

# Floax
set -g @floax-bind 'p'

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'

# Split panes with | (horizontal) and - (vertical), keep current path.
# MUST come after `run ~/.tmux/plugins/tpm/tpm` — tmux-menus and other
# plugins rebind `|` during their load, and last bind wins. The `\`
# alias lets you split without reaching for Shift (`|` == Shift+\).
bind | split-window -h -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Copy last command output to clipboard (Prefix + y)
bind y run-shell -b '/bin/zsh ~/.config/tmux/scripts/capture-last-output.sh'

# Keybinding cheatsheet popup (Prefix + ?)
bind ? display-popup -E -w 80% -h 80% -T " Keybindings " "bash ~/.config/tmux/scripts/tmux-cheatsheet.sh"

# Per-client SSH hostname pill. tmux renders status-left
# independently for each attached client, so
# #(ssh-client-host.sh #{client_pid}) prints this machine's
# hostname only when the viewing client's process ancestry
# contains sshd. Console-attached clients see a clean bar; an
# SSH-attached client sees the hostname pill between the "Main"
# session pill and the window list. The script owns its own
# styling — see ssh-client-host.sh. Appended after TPM so
# powerkit's own status-left is already set.
set -ag status-left '#(~/.config/tmux/scripts/ssh-client-host.sh #{client_pid})'

