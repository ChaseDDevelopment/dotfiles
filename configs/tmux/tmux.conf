# =============================================================================
# Tmux Configuration
# =============================================================================

# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Enable mouse support
set -g mouse on

# Allow passthrough for image previews (yazi, kitty graphics protocol)
set -g allow-passthrough on

# Use OSC 52 escape sequences for clipboard (works over SSH, no xclip/pbcopy needed)
set -s set-clipboard on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Change prefix from C-b to C-Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Window navigation with Alt+H and Alt+L
bind -n M-H previous-window
bind -n M-L next-window

# Enable vi mode for copy mode
set-window-option -g mode-keys vi

# Vi-style copy mode key bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Split panes using " and % and maintain current path
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Additional pane splitting shortcuts
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vim-tmux-navigator configuration
# Smart pane switching with awareness of Vim splits
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# Increase scrollback buffer size
set -g history-limit 50000

# Reduce escape time for faster command sequences
set -sg escape-time 1

# Enable focus events for vim
set -g focus-events on

# Aggressive resize for better multi-monitor support
setw -g aggressive-resize on

# Auto-cleanup: server exits when no sessions remain
set -g exit-empty on

# Don't rename windows automatically
set-option -g allow-rename off

# =============================================================================
# Plugins
# =============================================================================

# Set plugin manager path (required for TPM install scripts to work outside tmux)
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'

# --- Session persistence ---
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# --- Copy/paste ---
set -g @plugin 'tmux-plugins/tmux-yank'

# --- Text extraction ---
set -g @plugin 'laktak/extrakto'

# --- Floating pane ---
set -g @plugin 'omerxx/tmux-floax'

# --- Menus ---
set -g @plugin 'jaclu/tmux-menus'

# --- Status bar modules ---
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'

# =============================================================================
# Plugin Configuration
# =============================================================================

# Catppuccin theme
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'

# Catppuccin status bar
set -g status-left ""
set -g status-right-length 100
set -g status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_memory}"

# Battery: only show on laptops (macOS with battery or Linux with BAT*)
if-shell 'pmset -g batt 2>/dev/null | grep -q Battery || ls /sys/class/power_supply/BAT* >/dev/null 2>&1' \
    'set -agF status-right "#{E:@catppuccin_status_battery}"'

# tmux-yank
set -g @yank_selection_mouse 'clipboard'
set -g @yank_action 'copy-pipe-no-clear'
set -g @yank_line 'M-y'

# Resurrect + Continuum
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Extrakto
set -g @extrakto_key 'tab'
set -g @extrakto_split_direction 'p'
set -g @extrakto_popup_size '60%'

# Floax
set -g @floax-bind 'p'

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'

# Copy last command output to clipboard (Prefix + y)
bind y run-shell -b '/bin/zsh ~/.config/tmux/scripts/capture-last-output.sh'

# Keybinding cheatsheet popup (Prefix + ?)
bind ? display-popup -E -w 80% -h 80% -T " Keybindings " "bash ~/.config/tmux/scripts/tmux-cheatsheet.sh"

# Custom catppuccin memory module (loaded after TPM so theme vars are available)
source-file -q ~/.config/tmux/catppuccin-modules/memory.conf
