# =============================================================================
# Tmux Configuration
# =============================================================================

# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Terminal capabilities. tmux's tty_default_features() matches TERM by
# exact strcmp against a 7-entry list (tmux/XTerm/iTerm2/mintty/foot/
# WezTerm/rxvt-unicode); xterm-ghostty matches nothing, and Ghostty's
# shipped terminfo is deliberately sparse, so without explicit feature
# declarations tmux silently strips ~16 capabilities Ghostty supports
# (OSC 8 hyperlinks, OSC 52 clipboard, mode 2026 sync, undercurl, etc.).
# Both TERMs covered: xterm-ghostty (local) and xterm-256color (SSH
# fallback when the remote box lacks Ghostty's terminfo).
set -g default-terminal "tmux-256color"

# terminal-features and extended-keys are tmux >= 3.2, so gate them:
# older tmux (Debian/Pi bookworm ship 3.3a, Ubuntu 20.04 ships 3.0a)
# would otherwise abort config load with `invalid option`. tmux's %if
# evaluates an unknown #{version}/operator as empty -> false, so the
# block is simply skipped on tmux that predates the comparison rather
# than erroring. (#{>=:} is a string compare — correct for every
# shipped tmux through 3.7; revisit if tmux ever reaches a 3.10+ minor,
# where "3.10" would sort before "3.5" lexically.)
%if "#{>=:#{version},3.2}"
set -as terminal-features ",xterm-ghostty:RGB:clipboard:hyperlinks:sync:usstyle:extkeys:focus:osc7:title:ccolour:cstyle:strikethrough:bpaste:overline:margins:progressbar"
set -as terminal-features ",xterm-256color:RGB:clipboard:hyperlinks:sync:usstyle:extkeys:focus:osc7:title:ccolour:cstyle:strikethrough:bpaste:overline:margins:progressbar"

# Required for the extkeys feature to deliver disambiguated Ctrl-/,
# Ctrl-Tab, Shift-Enter etc. into apps inside tmux.
set -g extended-keys on
%endif

# extended-keys-format selects csi-u: the modern fixterms /
# Kitty-keyboard-style CSI u format that Neovim, fish, and Ghostty
# speak natively (the default is the older xterm modifyOtherKeys
# format). The option only exists in tmux >= 3.5; on 3.2-3.4 the
# `extended-keys on` above still applies, just in the legacy format.
%if "#{>=:#{version},3.5}"
set -g extended-keys-format csi-u
%endif

# Enable mouse support
set -g mouse on

# Allow passthrough for image previews (yazi, kitty graphics protocol).
# `allow-passthrough` is tmux >= 3.3.
%if "#{>=:#{version},3.3}"
set -g allow-passthrough on
%endif

# Use OSC 52 escape sequences for clipboard (works over SSH, no xclip/pbcopy needed)
set -s set-clipboard on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Change prefix from C-b to C-Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Window navigation with Alt+H and Alt+L
bind -n M-H previous-window
bind -n M-L next-window

# Enable vi mode for copy mode
set-window-option -g mode-keys vi

# Vi-style copy mode key bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Drop the default `"` and `%` split bindings. The `|` + `-` bindings
# are set AFTER `run ~/.tmux/plugins/tpm/tpm` below so plugins that
# bind `|` on load (e.g. tmux-menus) don't clobber ours.
unbind '"'
unbind %

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# C-h/j/k/l pane navigation is installed by christoomey/vim-tmux-navigator
# during TPM load; see @vim_navigator_pattern in Plugin Configuration for
# the nested/SSH passthrough behavior.

# Increase scrollback buffer size
set -g history-limit 50000

# Reduce escape time for faster command sequences
set -sg escape-time 10

# Enable focus events for vim
set -g focus-events on

# Aggressive resize for better multi-monitor support
setw -g aggressive-resize on

# Auto-cleanup: server exits when no sessions remain
set -g exit-empty on

# Programs can't hijack the window name via escape sequences.
# Our automatic-rename-format below picks a semantic label based on
# the foreground process / cwd.
set-option -g allow-rename off
set -g automatic-rename on

# Informative window names:
# - Dotted-version gibberish (e.g. Claude Code sets argv[0] to its
#   version "2.1.114") -> "claude"
# - Interactive shell (zsh/bash) -> basename of cwd (so you can see
#   which repo / directory the window is in)
# - Anything else -> the actual command name
set -g automatic-rename-format "#{?#{m:*.*.*,#{pane_current_command}},claude,#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{?#{==:#{pane_current_command},bash},#{b:pane_current_path},#{pane_current_command}}}}"

set -g window-status-format         ' #I:#W '
set -g window-status-current-format ' #I:#W '

# =============================================================================
# Plugins
# =============================================================================

# Set plugin manager path (required for TPM install scripts to work outside tmux)
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Status bar framework — tmux-powerkit supplies battery/cpu/memory/git/
# hostname/ssh/datetime modules internally, so the standalone
# tmux-battery and tmux-cpu plugins are intentionally absent here.
set -g @plugin 'fabioluciano/tmux-powerkit'

# --- Copy/paste ---
set -g @plugin 'tmux-plugins/tmux-yank'

# --- Text extraction ---
set -g @plugin 'laktak/extrakto'

# --- Floating pane ---
set -g @plugin 'omerxx/tmux-floax'

# =============================================================================
# Plugin Configuration
# =============================================================================

# vim-tmux-navigator: extend the pane-foreground match to also cover ssh
# and mosh. With this, C-h/j/k/l inside an SSH pane is forwarded to the
# remote (where the nested tmux takes over pane nav) instead of being
# swallowed by the local tmux. The base pattern matches the plugin's
# default (vim/nvim/fzf variants); appending ssh|mosh is the canonical
# nested-tmux fix documented in the plugin README.
set -g @vim_navigator_pattern '(\S+/)?g?\.?(view|l?n?vim?x?|fzf|ssh|mosh)(diff)?(-wrapped)?'

# Powerkit (TokyoNight Night). Minimal module set — hostname/ssh are
# redundant with the shell prompt's OS + SSH segments, git is already
# in the shell prompt, and the clock is noise. Battery module is
# omitted on ALL machines: macOS already shows battery in the menu bar,
# and powerkit's detection runs `pmset -g batt` every refresh, which
# floods macOS PerfPowerTelemetry (/var/db/powerlog) — it bloated to
# 44 GB on the Mac Mini. cpu/memory only.
set -g @powerkit_theme 'tokyo-night'
set -g @powerkit_theme_variant 'night'
set -g @powerkit_plugins 'cpu,memory'

# Powerkit overrides tmux-native status-position at load, so pinning
# the bar to the bottom must go through its own option.
set -g @powerkit_status_position 'bottom'

set -g @powerkit_bar_layout 'single'
set -g @powerkit_separator_style 'rounded'
set -g @powerkit_edge_separator_style 'rounded'
set -g @powerkit_status_interval 5
set -g @powerkit_lazy_loading 'true'

# Powerkit's default keybindings-list binding (C-y) collides with
# tmux-yank's @yank_line default. Move it to C-? so both coexist.
set -g @powerkit_keybindings_key 'C-?'

# tmux-yank
set -g @yank_selection_mouse 'clipboard'
set -g @yank_action 'copy-pipe-and-cancel'
set -g @yank_line 'M-y'

# Extrakto
set -g @extrakto_key 'tab'
set -g @extrakto_split_direction 'p'
set -g @extrakto_popup_size '60%'

# Floax
set -g @floax-bind 'p'

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'

# Split panes with | (horizontal) and - (vertical), keep current path.
# MUST come after `run ~/.tmux/plugins/tpm/tpm` — tmux-menus and other
# plugins rebind `|` during their load, and last bind wins. The `\`
# alias lets you split without reaching for Shift (`|` == Shift+\).
bind | split-window -h -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Copy last command output to clipboard (Prefix + y)
bind y run-shell -b '/bin/zsh ~/.config/tmux/scripts/capture-last-output.sh'

# Keybinding cheatsheet popup (Prefix + ?)
bind ? display-popup -E -w 80% -h 80% -T " Keybindings " "bash ~/.config/tmux/scripts/tmux-cheatsheet.sh"

# Per-client SSH hostname pill. tmux renders status-left
# independently for each attached client, so
# #(ssh-client-host.sh #{client_pid}) prints this machine's
# hostname only when the viewing client's process ancestry
# contains sshd. Console-attached clients see a clean bar; an
# SSH-attached client sees the pill at the leftmost position.
#
# Prepended (not appended) so it sits on the bar's left edge and
# avoids powerkit's session→windows chevron, which would leave a
# lavender sliver on the pill's left side. The prepend-ssh-host
# helper is idempotent — safe on source-file reload.
run-shell '~/.config/tmux/scripts/prepend-ssh-host.sh'
