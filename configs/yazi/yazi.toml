# =============================================================================
# Yazi Configuration
# =============================================================================
# Docs: https://yazi-rs.github.io/docs/configuration/yazi
# =============================================================================

[mgr]
ratio = [1, 4, 3]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
show_hidden = true
show_symlink = true
linemode = "size"
scrolloff = 5

[preview]
max_width = 1000
max_height = 1000
tab_size = 2

[opener]
open = [
    { run = 'open "$@"', orphan = true, for = "macos" },
    { run = 'xdg-open "$@"', orphan = true, for = "linux" },
]
reveal = [
    { run = 'open -R "$@"', orphan = true, for = "macos" },
    { run = 'xdg-open "$(dirname "$1")"', orphan = true, for = "linux" },
]
edit = [
    { run = '$EDITOR "$@"', block = true },
]
play = [
    { run = 'mpv --force-window "$@"', orphan = true, for = "macos" },
    { run = 'mpv --force-window "$@"', orphan = true, for = "linux" },
]

# --- Plugin fetcher registrations ---

# Use extension-based MIME detection (faster, avoids file(1) misclassification)
[[plugin.prepend_fetchers]]
id = "mime"
name = "*"
run = "mime-ext"
prio = "high"

[[plugin.prepend_fetchers]]
id = "git"
name = "*"
run = "git"

[[plugin.prepend_fetchers]]
id = "git"
name = "*/"
run = "git"
