$schema: https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
version: 2
final_space: true
console_title_template: "{{ .Shell }} in {{ .Folder }}"

palette:
  blue: "#7aa2f7"
  cyan: "#7dcfff"
  magenta: "#bb9af7"
  red: "#f7768e"
  yellow: "#e0af68"
  green: "#9ece6a"
  grey: "#565f89"

blocks:
  - type: prompt
    alignment: left
    newline: true
    segments:
      - type: path
        style: plain
        background: transparent
        foreground: "p:blue"
        template: "{{ .Path }}"
        properties:
          style: full
      - type: git
        style: plain
        foreground: "p:grey"
        background: transparent
        template: " {{ .HEAD }}{{ if or (.Working.Changed) (.Staging.Changed) }}*{{ end }} <p:cyan>{{ if gt .Behind 0 }}⇣{{ end }}{{ if gt .Ahead 0 }}⇡{{ end }}</>"
        properties:
          branch_icon: ""
          commit_icon: "@"
          fetch_status: true

  - type: rprompt
    overflow: hidden
    segments:
      - type: python
        style: plain
        foreground: "p:yellow"
        background: transparent
        template: " {{ if .Venv }}{{ .Venv }} {{ end }}{{ .Full }}"
        cache:
          duration: 24h
          strategy: folder
        properties:
          display_mode: context
          fetch_version: true
          fetch_virtual_env: true
      - type: node
        style: plain
        foreground: "p:green"
        background: transparent
        template: " {{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }}{{ if .Mismatch }} !={{ .Expected }}{{ end }}"
        cache:
          duration: 24h
          strategy: folder
        properties:
          display_mode: context
          fetch_version: true
          fetch_package_manager: true
      - type: go
        style: plain
        foreground: "p:cyan"
        background: transparent
        template: " {{ .Full }}"
        cache:
          duration: 24h
          strategy: folder
        properties:
          display_mode: context
          fetch_version: true
          parse_mod_file: true
      - type: rust
        style: plain
        foreground: "p:red"
        background: transparent
        template: " {{ .Full }}"
        cache:
          duration: 24h
          strategy: folder
        properties:
          display_mode: context
          fetch_version: true
      - type: dotnet
        style: plain
        foreground: "p:magenta"
        background: transparent
        template: " {{ if .Unsupported }}?{{ else }}{{ .Full }}{{ end }}"
        cache:
          duration: 24h
          strategy: folder
        properties:
          display_mode: context
          fetch_version: true
          fetch_sdk_version: true
      - type: executiontime
        style: plain
        foreground: "p:yellow"
        background: transparent
        template: " {{ .FormattedMs }}"
        properties:
          threshold: 5000

  - type: prompt
    alignment: left
    newline: true
    segments:
      - type: text
        style: plain
        foreground_templates:
          - "{{if gt .Code 0}}p:red{{end}}"
          - "{{if eq .Code 0}}p:magenta{{end}}"
        background: transparent
        template: "❯"

transient_prompt:
  foreground_templates:
    - "{{if gt .Code 0}}p:red{{end}}"
    - "{{if eq .Code 0}}p:magenta{{end}}"
  background: transparent
  template: "❯ "

secondary_prompt:
  foreground: "p:magenta"
  background: transparent
  template: "❯❯ "
