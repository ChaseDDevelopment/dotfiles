$schema: https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
version: 3
final_space: true
blocks:
  - type: prompt
    alignment: left
    segments:
      - type: path
        style: plain
        foreground: "#7E9CD8"
        properties:
          style: folder
        template: "{{ .Path }} "
      - type: git
        style: plain
        foreground: "#76946A"
        template: "{{ .HEAD }} "
      - type: text
        style: plain
        foreground: "#DCD7BA"
        template: "❯ "
