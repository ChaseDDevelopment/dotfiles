name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: installer/go.mod

      - name: Vet
        working-directory: installer
        run: go vet ./...

      - name: Test
        working-directory: installer
        run: go test -race ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: installer
